openapi: 3.0.3
info:
  title: Member Detail Module APIs
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /members/{id}/profile:
    get:
      summary: Get member profile card
      tags: [Member Detail]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: gymId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Member profile payload }
  /payments:
    post:
      summary: Receive payment (owner app format)
      tags: [Member Detail]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id, amount, payment_mode]
              properties:
                member_id: { type: string }
                subscription_id: { type: string }
                amount: { type: integer }
                payment_mode: { type: string, enum: [cash, upi, card] }
                date: { type: string, format: date-time }
      responses:
        '200': { description: Payment saved }
  /members/{id}/payments:
    get:
      summary: Member payment history
      tags: [Member Detail]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: gymId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Payments list }
  /members/{id}/subscriptions:
    get:
      summary: Member subscriptions list
      tags: [Member Detail]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: gymId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Active + completed subscriptions }
  /subscriptions:
    post:
      summary: Add subscription (owner app format)
      tags: [Member Detail]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id, price, start_date]
              properties:
                member_id: { type: string }
                plan_id: { type: string }
                plan_name: { type: string }
                duration_months: { type: integer }
                price: { type: integer }
                start_date: { type: string, format: date-time }
                discount: { type: integer }
      responses:
        '200': { description: Subscription added }
  /subscriptions/{id}/freeze:
    post:
      summary: Freeze subscription
      tags: [Member Detail]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
  /subscriptions/{id}/extend:
    post:
      summary: Extend subscription
      tags: [Member Detail]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
  /attendance:
    post:
      summary: Mark attendance
      tags: [Member Detail]
  /members/{id}/attendance:
    get:
      summary: Member attendance details
      tags: [Member Detail]
  /members/{id}/workouts:
    get:
      summary: Get workouts
      tags: [Member Detail]
  /workouts:
    post:
      summary: Add workout
      tags: [Member Detail]
  /members/{id}/diet:
    get:
      summary: Get diet plans
      tags: [Member Detail]
  /diet:
    post:
      summary: Add diet entry
      tags: [Member Detail]
  /members/{id}/payment-summary:
    get:
      summary: Member payment summary
      tags: [Member Detail]
