openapi: 3.0.3
info:
  title: Advanced Subscription, Profile & Analytics APIs
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /subscriptions:
    get:
      summary: List subscriptions for a gym
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
    post:
      summary: Create subscription with compatibility payload
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}:
    get:
      summary: Get subscription detail
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/freeze:
    post:
      summary: Freeze subscription with optional fee and reason
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/extend:
    post:
      summary: Extend subscription with optional fee and reason
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/renew:
    post:
      summary: Renew subscription (new record)
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/upgrade:
    post:
      summary: Upgrade subscription to another plan
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/unfreeze:
    post:
      summary: Unfreeze subscription
      tags: [Subscriptions]
      description: Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/cancel:
    post:
      summary: Cancel subscription
      tags: [Subscriptions]
      description: Safe end-state action. Gym owner is allowed automatically; trainer/staff need `members:manage`.
  /subscriptions/{id}/invoice:
    post:
      summary: Issue invoice for a subscription
      tags: [Invoices]
      description: Gym owner is allowed automatically; trainer/staff need either `members:manage` or `payments:access`.
  /payments/analytics:
    get:
      summary: Payment analytics by range
      tags: [Payments]
      description: Gym owner is allowed automatically; trainer/staff need `payments:access`.
  /payments:
    get:
      summary: Global payment history with search + pagination
      tags: [Payments]
      description: Gym owner is allowed automatically; trainer/staff need `payments:access`.
    post:
      summary: Receive payment for a member subscription
      tags: [Payments]
      description: Gym owner is allowed automatically; trainer/staff need `payments:access`.
  /invoices/{id}:
    get:
      summary: Get invoice detail
      tags: [Invoices]
      description: Gym owner is allowed automatically; trainer/staff need `payments:access`.
  /profile:
    get:
      summary: Get user profile
      tags: [Profile]
    put:
      summary: Update user profile
      tags: [Profile]
    delete:
      summary: Soft delete account
      tags: [Profile]
  /auth/logout:
    post:
      summary: Logout current session
      tags: [Auth]
