# Coolify / Nixpacks — install all deps for build (TypeScript, Nest CLI, Prisma).
# Runtime needs `prisma` CLI for startup migrate deploy; it lives in dependencies.
[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npm run start:prod"
